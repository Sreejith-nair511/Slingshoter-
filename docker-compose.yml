version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: trustcalib-postgres
    environment:
      POSTGRES_USER: trustcalib
      POSTGRES_PASSWORD: trustcalib_password
      POSTGRES_DB: trustcalib
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trustcalib-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustcalib"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: trustcalib-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trustcalib-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Python Verification Service
  verification:
    build:
      context: ./services/verification
      dockerfile: Dockerfile
    container_name: trustcalib-verification
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trustcalib-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Next.js Application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustcalib-nextjs
    environment:
      DATABASE_URL: postgresql://trustcalib:trustcalib_password@postgres:5432/trustcalib?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHON_SERVICE_URL: http://verification:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      verification:
        condition: service_healthy
    networks:
      - trustcalib-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  trustcalib-network:
    driver: bridge
